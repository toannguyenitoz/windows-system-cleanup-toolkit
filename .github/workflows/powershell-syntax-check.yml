name: PowerShell Syntax Check

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PowerShell parse check
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content .\scripts\CleanSweep.ps1 -Raw), [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List
            exit 1
          }
